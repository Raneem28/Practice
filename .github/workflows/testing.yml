name: Deploy to Testing (PR Workflow)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger button

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT CODE
      # ─────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. SET UP NODE.JS
      # ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # ─────────────────────────────────────────
      # 3. BUILD — Install dependencies & build frontend
      # ─────────────────────────────────────────
      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Install Client Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://${{ secrets.TESTING_SERVER_IP }}:5000

      # ─────────────────────────────────────────
      # 4. UNIT TESTS
      # ─────────────────────────────────────────
      - name: Run Server Unit Tests
        working-directory: server
        run: npm test
        env:
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          NODE_ENV: test

      - name: Run Client Unit Tests
        working-directory: client
        run: npm test -- --run

      # ─────────────────────────────────────────
      # 5. LINTING / CODE ANALYSIS
      # ─────────────────────────────────────────
      - name: Lint Server Code
        working-directory: server
        run: npm run lint

      - name: Lint Client Code
        working-directory: client
        run: npm run lint

      # ─────────────────────────────────────────
      # 6. DEPLOY TO TESTING EC2 (SSH + git pull)
      # ─────────────────────────────────────────
      - name: Deploy to Testing Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TESTING_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.TESTING_SSH_PRIVATE_KEY }}
          script: |
            # Pull latest code
            cd /home/ubuntu/app
            git pull origin main

            # Restart backend
            cd server
            npm ci --omit=dev
            pm2 restart todo-server || pm2 start index.js --name todo-server
            pm2 save

            # Rebuild and serve frontend
            cd ../client
            npm ci
            npm run build
            pm2 restart todo-client || pm2 serve dist 3000 --name todo-client --spa
            pm2 save

      # ─────────────────────────────────────────
      # 7a. EMAIL — Notify QA on success
      # ─────────────────────────────────────────
      - name: Send Success Email to QA
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: ${{ secrets.QA_EMAIL }}
          from: CS316 CI/CD Pipeline <${{ secrets.EMAIL_USERNAME }}>
          subject: "✅ [Testing] Deployment Successful — PR #${{ github.event.pull_request.number }}"
          body: |
            Hello QA,

            A new pull request has been successfully deployed to the Testing environment.

            ─────────────────────────────────────
            PR Details
            ─────────────────────────────────────
            PR Title  : ${{ github.event.pull_request.title }}
            PR Author : ${{ github.event.pull_request.user.login }}
            PR Link   : ${{ github.event.pull_request.html_url }}
            Branch    : ${{ github.head_ref }} → main
            Commit    : ${{ github.sha }}

            ─────────────────────────────────────
            Access the App for Testing
            ─────────────────────────────────────
            Frontend  : http://${{ secrets.TESTING_SERVER_IP }}:3000
            Backend   : http://${{ secrets.TESTING_SERVER_IP }}:5000

            Please review and validate the changes.

            Regards,
            CS316 DevOps Pipeline

      # ─────────────────────────────────────────
      # 7b. EMAIL — Notify developer + QA on failure
      # ─────────────────────────────────────────
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          to: ${{ secrets.QA_EMAIL }},${{ secrets.DEVELOPER_EMAIL }}
          from: CS316 CI/CD Pipeline <${{ secrets.EMAIL_USERNAME }}>
          subject: "❌ [Testing] Workflow Failed — PR #${{ github.event.pull_request.number }}"
          body: |
            Hello,

            The CI/CD workflow for the following pull request has FAILED.

            ─────────────────────────────────────
            PR Details
            ─────────────────────────────────────
            PR Title  : ${{ github.event.pull_request.title }}
            PR Author : ${{ github.event.pull_request.user.login }}
            PR Link   : ${{ github.event.pull_request.html_url }}
            Branch    : ${{ github.head_ref }} → main
            Commit    : ${{ github.sha }}

            ─────────────────────────────────────
            View Workflow Logs
            ─────────────────────────────────────
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please fix the issues and push again.

            Regards,
            CS316 DevOps Pipeline
